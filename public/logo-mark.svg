<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!--
    Mark concept: "raised tray" / upward bracket
    A horizontal bar at the top (the thing being held up),
    with two vertical arms descending from each end.
    The open-bottom U-shape reads as a platform held aloft —
    referencing the gesture of holding something up to camera.
    All strokes share the same weight (2px) for cohesion at small sizes.
  -->
  <g fill="none" stroke="#A8584A" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter">
    <!-- Top horizontal bar: x=5 to x=27, y=10 -->
    <line x1="5" y1="10" x2="27" y2="10"/>
    <!-- Left arm: descends from left end of bar to y=22 -->
    <line x1="5" y1="10" x2="5" y2="22"/>
    <!-- Right arm: descends from right end of bar to y=22 -->
    <line x1="27" y1="10" x2="27" y2="22"/>
  </g>
</svg>
