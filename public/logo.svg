<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 40" width="200" height="40">
  <!--
    Holdup horizontal wordmark — terracotta variant
    Mark: "raised tray" bracket scaled to ~22px tall, left-aligned
    Text: "holdup" in Cormorant Garamond italic, 28px, baseline at y=30
    Total layout: mark (0–20px wide) + 8px gap + text (~160px wide)
  -->

  <!-- Geometric mark: raised tray / upward bracket -->
  <!-- Original 32x32 coords scaled by factor ~0.6875 to fit ~22px height -->
  <!-- Bar: x=3.4–18.6, y=6.9; arms drop to y=15.1 -->
  <g fill="none" stroke="#A8584A" stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"
     transform="translate(2, 9)">
    <!--
      Scaled mark (scale factor: 22/32 = 0.6875):
      Top bar: x=3.44 to x=18.56, y=6.88
      Left arm: x=3.44, y=6.88 to y=15.13
      Right arm: x=18.56, y=6.88 to y=15.13
      Total mark width: ~22px, height: ~22px
    -->
    <line x1="3.4" y1="6.9" x2="18.6" y2="6.9"/>
    <line x1="3.4" y1="6.9" x2="3.4" y2="15.1"/>
    <line x1="18.6" y1="6.9" x2="18.6" y2="15.1"/>
  </g>

  <!-- Wordmark: "holdup" in Cormorant Garamond italic -->
  <text
    x="30"
    y="30"
    font-family="'Cormorant Garamond', 'Cormorant', Georgia, serif"
    font-style="italic"
    font-weight="600"
    font-size="28"
    fill="#A8584A"
    letter-spacing="0.02em"
  >holdup</text>
</svg>
